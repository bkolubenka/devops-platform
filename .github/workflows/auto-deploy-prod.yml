name: Auto Deploy Prod

on:
  workflow_run:
    workflows:
      - Publish Images
    types:
      - completed

permissions:
  contents: read
  packages: read

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy_prod:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: vps-1

    steps:
      - name: Checkout repository at published commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Set deploy metadata
        id: deploy_meta
        run: |
          echo "image_tag=$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-12)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Share GHCR auth with root
        env:
          SUDO_PASS: ${{ secrets.BECOME_PASSWORD }}
        run: |
          if [ ! -f "$HOME/.docker/config.json" ]; then
            echo "Missing GHCR docker config at $HOME/.docker/config.json"
            exit 1
          fi
          printf '%s\n' "$SUDO_PASS" | sudo -S -p '' mkdir -p /root/.docker
          printf '%s\n' "$SUDO_PASS" | sudo -S -p '' cp "$HOME/.docker/config.json" /root/.docker/config.json
          printf '%s\n' "$SUDO_PASS" | sudo -S -p '' chmod 600 /root/.docker/config.json

      - name: Create local Ansible inventory for VM runner
        run: |
          cat > infra/ansible/inventory.runner.ini <<EOF
          [server]
          localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Run production deploy playbook
        env:
          ANSIBLE_BECOME_PASSWORD: ${{ secrets.BECOME_PASSWORD }}
          DEPLOY_ENV: prod
          DEPLOY_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          DEPLOY_REPO_REF: ${{ github.event.workflow_run.head_branch }}
          DEPLOY_GHCR_OWNER: ${{ github.repository_owner }}
          DEPLOY_IMAGE_TAG: ${{ steps.deploy_meta.outputs.image_tag }}
          DEPLOY_APP_VERSION: 2.1.0
          DEPLOY_BUILD_SHA: ${{ github.event.workflow_run.head_sha }}
          DEPLOY_BUILD_DATE: ${{ steps.deploy_meta.outputs.build_date }}
          DEPLOY_BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          DEPLOY_CONTAINER_REGISTRY: ghcr.io/${{ github.repository_owner }}
          DEPLOY_ROLLBACK_TO_PREVIOUS: false
          DEPLOY_DB_USER: devops_user
          DEPLOY_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DEPLOY_SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEPLOY_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DEPLOY_ALLOW_HTTP01_FALLBACK: false
        run: |
          ANSIBLE_LOCAL_TEMP=/tmp/.ansible/tmp \
          ansible-playbook \
          -i infra/ansible/inventory.runner.ini \
          infra/ansible/playbook.yml \
          -e "ansible_become_password=${ANSIBLE_BECOME_PASSWORD}" \
          -e "deploy_env=${DEPLOY_ENV}"
