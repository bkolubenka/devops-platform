name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Create temporary Ansible inventory
        run: |
          cat > infra/ansible/inventory.ci.ini <<EOF
          [server]
          target ansible_host=${{ secrets.SSH_HOST }} ansible_user=${{ secrets.SSH_USER }}
          EOF

      - name: Run deploy playbook
        env:
          ANSIBLE_BECOME_PASSWORD: ${{ secrets.BECOME_PASSWORD }}
        run: |
          ANSIBLE_LOCAL_TEMP=/tmp/.ansible/tmp \
          ansible-playbook \
          -i infra/ansible/inventory.ci.ini \
          infra/ansible/playbook.yml \
          -e "ansible_become_password=${ANSIBLE_BECOME_PASSWORD}"
