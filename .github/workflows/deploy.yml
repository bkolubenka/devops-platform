name: Deploy
run-name: Deploy - ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_env || 'dev' }}

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Compose environment to deploy"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "Image tag to deploy in prod (12-char SHA from Publish Images)"
        required: false
        default: ""
        type: string
      rollback_to_previous:
        description: "Rollback prod to the previous recorded release"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_env || 'dev') == 'dev' && 'vm-1' || 'vps-1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Set deploy metadata
        id: deploy_meta
        run: |
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          tag="${{ inputs.image_tag }}"
          echo "image_tag=${tag::12}" >> "$GITHUB_OUTPUT"

      - name: Validate production deploy contract
        if: ${{ inputs.deploy_env == 'prod' }}
        run: |
          if [ "${{ inputs.rollback_to_previous }}" = "false" ]; then
            if [ -z "${{ inputs.image_tag }}" ] || [ "${{ inputs.image_tag }}" = "main" ]; then
              echo "Production deploys must use an immutable SHA tag. Copy the 12-char SHA from Publish Images output."
              exit 1
            fi
            if ! echo "${{ inputs.image_tag }}" | grep -Eq '^[0-9a-f]{7,40}$'; then
              echo "Production deploys must use a SHA-like image tag (7-40 hex chars; will be truncated to 12)."
              exit 1
            fi
          fi

      - name: Set up SSH for remote deployment
        if: ${{ inputs.deploy_env == 'prod' && runner.name != 'vps-1' }}
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          SSH_HOST_CLEAN="$(echo "${SSH_HOST}" | tr -d '[:space:]')"
          SSH_USER_CLEAN="$(echo "${SSH_USER}" | tr -d '[:space:]')"

          if [ -z "${SSH_KEY}" ] || [ -z "${SSH_HOST_CLEAN}" ] || [ -z "${SSH_USER_CLEAN}" ]; then
            echo "Missing required secrets for remote prod deploy. Ensure SSH_PRIVATE_KEY, SSH_HOST, and SSH_USER are set."
            exit 1
          fi

          echo "SSH_HOST_CLEAN=${SSH_HOST_CLEAN}" >> "$GITHUB_ENV"
          echo "SSH_USER_CLEAN=${SSH_USER_CLEAN}" >> "$GITHUB_ENV"

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST_CLEAN" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create Ansible inventory
        run: |
          if [ "${{ inputs.deploy_env }}" = "prod" ] && [ "$RUNNER_NAME" != "vps-1" ]; then
            cat > infra/ansible/inventory.runner.ini <<EOF
          [server]
          prod-target ansible_host=${SSH_HOST_CLEAN} ansible_user=${SSH_USER_CLEAN} ansible_python_interpreter=/usr/bin/python3 ansible_ssh_private_key_file=$HOME/.ssh/deploy_key
          EOF
          else
            cat > infra/ansible/inventory.runner.ini <<EOF
          [server]
          localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3
          EOF
          fi

      - name: Run deploy playbook
        env:
          ANSIBLE_BECOME_PASSWORD: ${{ secrets.BECOME_PASSWORD }}
          DEPLOY_ENV: ${{ inputs.deploy_env }}
          DEPLOY_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          DEPLOY_REPO_REF: ${{ github.ref_name }}
          DEPLOY_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DEPLOY_GHCR_OWNER: ${{ github.repository_owner }}
          DEPLOY_IMAGE_TAG: ${{ steps.deploy_meta.outputs.image_tag }}
          DEPLOY_APP_VERSION: 2.1.0
          DEPLOY_BUILD_SHA: ${{ steps.deploy_meta.outputs.image_tag }}
          DEPLOY_BUILD_DATE: ${{ steps.deploy_meta.outputs.build_date }}
          DEPLOY_BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          DEPLOY_CONTAINER_REGISTRY: ghcr.io/${{ github.repository_owner }}
          DEPLOY_ROLLBACK_TO_PREVIOUS: ${{ inputs.rollback_to_previous }}
          DEPLOY_DB_USER: devops_user
          DEPLOY_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DEPLOY_SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEPLOY_GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_GRAFANA_PASSWORD: ${{ secrets.DEPLOY_GRAFANA_PASSWORD }}
          DEPLOY_INCIDENT_ASSISTANT_USE_OLLAMA: ${{ vars.INCIDENT_ASSISTANT_USE_OLLAMA }}
          DEPLOY_OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          DEPLOY_OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          DEPLOY_OLLAMA_TIMEOUT_SECONDS: ${{ vars.OLLAMA_TIMEOUT_SECONDS }}
        run: |
          EXTRA_ARGS=()
          if [ -n "${ANSIBLE_BECOME_PASSWORD}" ]; then
            EXTRA_ARGS+=( -e "ansible_become_password=${ANSIBLE_BECOME_PASSWORD}" )
          fi

          ANSIBLE_LOCAL_TEMP=/tmp/.ansible/tmp \
          ansible-playbook \
          -i infra/ansible/inventory.runner.ini \
          infra/ansible/playbook.yml \
          "${EXTRA_ARGS[@]}" \
          -e "deploy_env=${DEPLOY_ENV}"
