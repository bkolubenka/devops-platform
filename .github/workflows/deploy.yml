name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Compose environment to deploy"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "Image tag to deploy in prod"
        required: true
        default: main
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Set deploy metadata
        id: deploy_meta
        run: |
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR for production deploys
        if: ${{ inputs.deploy_env == 'prod' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Share GHCR auth with root for production deploys
        if: ${{ inputs.deploy_env == 'prod' }}
        run: |
          sudo mkdir -p /root/.docker
          sudo cp "$HOME/.docker/config.json" /root/.docker/config.json
          sudo chmod 600 /root/.docker/config.json

      - name: Create local Ansible inventory for VM runner
        run: |
          cat > infra/ansible/inventory.runner.ini <<EOF
          [server]
          localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Run deploy playbook
        env:
          ANSIBLE_BECOME_PASSWORD: ${{ secrets.BECOME_PASSWORD }}
          DEPLOY_ENV: ${{ inputs.deploy_env }}
          DEPLOY_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          DEPLOY_REPO_REF: ${{ github.ref_name }}
          DEPLOY_GHCR_OWNER: ${{ github.repository_owner }}
          DEPLOY_IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOY_APP_VERSION: 2.1.0
          DEPLOY_BUILD_SHA: ${{ inputs.image_tag }}
          DEPLOY_BUILD_DATE: ${{ steps.deploy_meta.outputs.build_date }}
        run: |
          ANSIBLE_LOCAL_TEMP=/tmp/.ansible/tmp \
          ansible-playbook \
          -i infra/ansible/inventory.runner.ini \
          infra/ansible/playbook.yml \
          -e "ansible_become_password=${ANSIBLE_BECOME_PASSWORD}" \
          -e "deploy_env=${DEPLOY_ENV}"
