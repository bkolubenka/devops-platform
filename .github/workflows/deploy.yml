name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Compose environment to deploy"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "Image tag to deploy in prod"
        required: true
        default: main
        type: string
      rollback_to_previous:
        description: "Rollback prod to the previous recorded release"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ${{ inputs.deploy_env == 'prod' && 'vps-1' || 'vm-1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Set deploy metadata
        id: deploy_meta
        run: |
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Validate production deploy contract
        if: ${{ inputs.deploy_env == 'prod' }}
        run: |
          if [ "${{ inputs.rollback_to_previous }}" = "false" ]; then
            if [ "${{ inputs.image_tag }}" = "main" ]; then
              echo "Production deploys must use an immutable SHA tag, not 'main'."
              exit 1
            fi
            if ! echo "${{ inputs.image_tag }}" | grep -Eq '^[0-9a-f]{7,40}$'; then
              echo "Production deploys must use a SHA-like image tag."
              exit 1
            fi
          fi

      - name: Log in to GHCR for production deploys
        if: ${{ inputs.deploy_env == 'prod' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Share GHCR auth with root for production deploys
        if: ${{ inputs.deploy_env == 'prod' }}
        env:
          SUDO_PASS: ${{ secrets.BECOME_PASSWORD }}
        run: |
          if [ ! -f "$HOME/.docker/config.json" ]; then
            echo "Missing GHCR docker config at $HOME/.docker/config.json"
            exit 1
          fi
          printf '%s\n' "$SUDO_PASS" | sudo -S -p '' mkdir -p /root/.docker
          printf '%s\n' "$SUDO_PASS" | sudo -S -p '' cp "$HOME/.docker/config.json" /root/.docker/config.json
          printf '%s\n' "$SUDO_PASS" | sudo -S -p '' chmod 600 /root/.docker/config.json

      - name: Create local Ansible inventory for VM runner
        run: |
          cat > infra/ansible/inventory.runner.ini <<EOF
          [server]
          localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Run deploy playbook
        env:
          ANSIBLE_BECOME_PASSWORD: ${{ secrets.BECOME_PASSWORD }}
          DEPLOY_ENV: ${{ inputs.deploy_env }}
          DEPLOY_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          DEPLOY_REPO_REF: ${{ github.ref_name }}
          DEPLOY_GHCR_OWNER: ${{ github.repository_owner }}
          DEPLOY_IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOY_APP_VERSION: 2.1.0
          DEPLOY_BUILD_SHA: ${{ inputs.image_tag }}
          DEPLOY_BUILD_DATE: ${{ steps.deploy_meta.outputs.build_date }}
          DEPLOY_BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          DEPLOY_CONTAINER_REGISTRY: ghcr.io/${{ github.repository_owner }}
          DEPLOY_ROLLBACK_TO_PREVIOUS: ${{ inputs.rollback_to_previous }}
          DEPLOY_DB_USER: devops_user
          DEPLOY_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DEPLOY_SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEPLOY_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DEPLOY_ALLOW_HTTP01_FALLBACK: false
        run: |
          ANSIBLE_LOCAL_TEMP=/tmp/.ansible/tmp \
          ansible-playbook \
          -i infra/ansible/inventory.runner.ini \
          infra/ansible/playbook.yml \
          -e "ansible_become_password=${ANSIBLE_BECOME_PASSWORD}" \
          -e "deploy_env=${DEPLOY_ENV}"
