name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Compose environment to deploy"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Create local Ansible inventory for VM runner
        run: |
          cat > infra/ansible/inventory.runner.ini <<EOF
          [server]
          localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Run deploy playbook
        env:
          ANSIBLE_BECOME_PASSWORD: ${{ secrets.BECOME_PASSWORD }}
          DEPLOY_ENV: ${{ inputs.deploy_env }}
          DEPLOY_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          DEPLOY_REPO_REF: ${{ github.ref_name }}
        run: |
          ANSIBLE_LOCAL_TEMP=/tmp/.ansible/tmp \
          ansible-playbook \
          -i infra/ansible/inventory.runner.ini \
          infra/ansible/playbook.yml \
          -e "ansible_become_password=${ANSIBLE_BECOME_PASSWORD}" \
          -e "deploy_env=${DEPLOY_ENV}"
