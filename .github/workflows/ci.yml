name: CI

on:
  pull_request:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Install backend dependencies
        run: pip install -r apps/devops-platform/backend/requirements.txt

      - name: Validate backend syntax
        run: python -m py_compile apps/devops-platform/backend/main.py apps/devops-platform/backend/database.py apps/devops-platform/backend/models.py apps/devops-platform/backend/monitor_worker.py

      - name: Run backend unit tests
        working-directory: apps/devops-platform
        env:
          DATABASE_URL: "sqlite://"
        run: python -m pytest backend/tests/ -v --tb=short

      - name: Validate Ansible playbook syntax
        run: |
          ANSIBLE_LOCAL_TEMP=/tmp/.ansible/tmp \
          ansible-playbook --syntax-check infra/ansible/playbook.yml -i infra/ansible/inventory.ini

      - name: Build and start dev stack
        run: docker compose --env-file apps/devops-platform/.env.dev -f apps/devops-platform/docker-compose.dev.yaml up -d --build

      - name: Run container smoke tests
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          base_url = "http://127.0.0.1:8081"

          checks = [
              (f"{base_url}/health", {"status": "ok"}),
              (f"{base_url}/api/health", {"status": "ok"}),
              (f"{base_url}/api/overview", None),
              (f"{base_url}/api/services", None),
          ]

          def fetch_json(url: str):
              with urllib.request.urlopen(url, timeout=5) as response:
                  return json.load(response)

          deadline = time.time() + 120
          while True:
              try:
                  results = {}
                  for url, expected in checks:
                      payload = fetch_json(url)
                      if expected is not None:
                          for key, value in expected.items():
                              assert payload.get(key) == value, (url, payload)
                      results[url] = payload

                  assert "services" in results[f"{base_url}/api/overview"]
                  assert isinstance(results[f"{base_url}/api/services"], list)
                  break
              except Exception:
                  if time.time() >= deadline:
                      raise
                  time.sleep(5)
          PY

      - name: Stop dev stack
        if: always()
        run: docker compose --env-file apps/devops-platform/.env.dev -f apps/devops-platform/docker-compose.dev.yaml down -v
