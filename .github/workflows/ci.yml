name: CI

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Install backend dependencies
        run: pip install -r app/backend/requirements.txt

      - name: Validate backend syntax
        run: python -m py_compile app/backend/main.py app/backend/database.py app/backend/models.py app/backend/monitor_worker.py

      - name: Run backend unit tests
        working-directory: app
        env:
          DATABASE_URL: "sqlite://"
        run: python -m pytest backend/tests/ -v --tb=short

      - name: Validate Ansible playbook syntax
        run: |
          ANSIBLE_LOCAL_TEMP=/tmp/.ansible/tmp \
          ansible-playbook --syntax-check infra/ansible/playbook.yml -i infra/ansible/inventory.ini

      - name: Build and start dev stack
        run: docker compose --env-file .env.dev -f docker-compose.dev.yaml up -d --build

      - name: Run container smoke tests
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          checks = [
              ("http://127.0.0.1/health", {"status": "ok"}),
              ("http://127.0.0.1/api/health", {"status": "ok"}),
              ("http://127.0.0.1/api/overview", None),
              ("http://127.0.0.1/api/services", None),
          ]

          def fetch_json(url: str):
              with urllib.request.urlopen(url, timeout=5) as response:
                  return json.load(response)

          deadline = time.time() + 120
          while True:
              try:
                  results = {}
                  for url, expected in checks:
                      payload = fetch_json(url)
                      if expected is not None:
                          for key, value in expected.items():
                              assert payload.get(key) == value, (url, payload)
                      results[url] = payload

                  assert "services" in results["http://127.0.0.1/api/overview"]
                  assert isinstance(results["http://127.0.0.1/api/services"], list)
                  break
              except Exception:
                  if time.time() >= deadline:
                      raise
                  time.sleep(5)
          PY

      - name: Stop dev stack
        if: always()
        run: docker compose --env-file .env.dev -f docker-compose.dev.yaml down -v
