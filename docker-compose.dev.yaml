services:
  db:
    image: postgres:15-alpine
    container_name: devops_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: backend
    restart: unless-stopped
    command: sh -c "alembic -c backend/alembic.ini upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ENVIRONMENT=${ENVIRONMENT}
      - APP_VERSION=${APP_VERSION}
      - BUILD_SHA=${BUILD_SHA}
      - IMAGE_TAG=${IMAGE_TAG}
      - BUILD_DATE=${BUILD_DATE}
      - BUILD_ID=${BUILD_ID}
      - CONTAINER_REGISTRY=${CONTAINER_REGISTRY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  monitor-worker:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: monitor_worker
    restart: unless-stopped
    command: ["python", "-m", "backend.monitor_worker"]
    expose:
      - "9000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ENVIRONMENT=${ENVIRONMENT}
      - MONITOR_INTERVAL_SECONDS=${MONITOR_INTERVAL_SECONDS}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  action-runner:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: action_runner
    restart: unless-stopped
    command: ["python", "-m", "backend.monitor_worker"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ENVIRONMENT=${ENVIRONMENT}
      - MONITOR_INTERVAL_SECONDS=${ACTION_RUNNER_INTERVAL_SECONDS}
      - MONITOR_PROBES_ENABLED=${ACTION_RUNNER_PROBES_ENABLED}
      - MONITOR_HEALTH_PORT=${ACTION_RUNNER_HEALTH_PORT}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./app/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
