services:
  db:
    image: postgres:15-alpine
    container_name: devops_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: devops_platform
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: devops_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops_user -d devops_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: backend
    restart: unless-stopped
    command: sh -c "alembic -c backend/alembic.ini upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://devops_user:devops_password@db:5432/devops_platform
      - ENVIRONMENT=development
      - APP_VERSION=2.1.0
      - BUILD_SHA=dev-local
      - IMAGE_TAG=dev-local
      - BUILD_DATE=local-build
      - BUILD_ID=local-run
      - CONTAINER_REGISTRY=local-build
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  monitor-worker:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: monitor_worker
    restart: unless-stopped
    command: ["python", "-m", "backend.monitor_worker"]
    expose:
      - "9000"
    environment:
      - DATABASE_URL=postgresql://devops_user:devops_password@db:5432/devops_platform
      - ENVIRONMENT=development
      - MONITOR_INTERVAL_SECONDS=60
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./app/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
