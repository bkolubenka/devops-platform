services:
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: backend
    restart: unless-stopped
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./app/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
