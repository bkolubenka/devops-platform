services:
  db:
    image: postgres:15-alpine
    container_name: devops_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: devops_platform
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: devops_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops_user -d devops_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://devops_user:devops_password@db:5432/devops_platform
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./app/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
