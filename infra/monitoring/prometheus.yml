global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: "monitor-worker"
    static_configs:
      - targets: ["monitor-worker:9000"]
    metrics_path: /metrics
