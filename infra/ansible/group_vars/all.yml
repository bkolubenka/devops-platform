app_name: devops-platform
app_base_dir: /home/make/apps
app_dir: "{{ app_base_dir }}/{{ app_name }}"
runtime_root: /opt/devops-platform
runtime_release_dir: "{{ runtime_root }}/releases"
runtime_current_release_file: "{{ runtime_release_dir }}/current_release.env"
runtime_previous_release_file: "{{ runtime_release_dir }}/previous_release.env"
runtime_env_file: "{{ runtime_root }}/.env"
repo_url: "{{ lookup('env', 'DEPLOY_REPO_URL') | default('https://github.com/bkolubenka/devops-platform.git', true) }}"
repo_version: "{{ lookup('env', 'DEPLOY_REPO_REF') | default('main', true) }}"
ghcr_owner: "{{ lookup('env', 'DEPLOY_GHCR_OWNER') | default('bkolubenka', true) }}"
image_tag: "{{ lookup('env', 'DEPLOY_IMAGE_TAG') | default(repo_version, true) }}"
app_version: "{{ lookup('env', 'DEPLOY_APP_VERSION') | default('2.1.0', true) }}"
build_sha: "{{ lookup('env', 'DEPLOY_BUILD_SHA') | default(image_tag, true) }}"
build_date: "{{ lookup('env', 'DEPLOY_BUILD_DATE') | default('unknown', true) }}"
build_id: "{{ lookup('env', 'DEPLOY_BUILD_ID') | default('unknown', true) }}"
container_registry: "{{ lookup('env', 'DEPLOY_CONTAINER_REGISTRY') | default('local-build', true) }}"
rollback_to_previous: "{{ lookup('env', 'DEPLOY_ROLLBACK_TO_PREVIOUS') | default('false', true) | bool }}"
db_user: "{{ lookup('env', 'DEPLOY_DB_USER') | default('devops_user', true) }}"
db_password: "{{ lookup('env', 'DEPLOY_DB_PASSWORD') | default('devops_password', true) }}"
secret_key: "{{ lookup('env', 'DEPLOY_SECRET_KEY') | default('change-me', true) }}"

# Environment-specific settings
deploy_env: "{{ lookup('env', 'DEPLOY_ENV') | default('dev', true) }}"

# Compose file based on environment
compose_file: "docker-compose.{{ deploy_env }}.yaml"

# Ports
backend_internal_port: 8000
nginx_host_port: 80
nginx_ssl_port: 443

# Health check
healthcheck_url: "http://127.0.0.1/health"

# Domain configuration (update with your actual domain)
domain_name: "yourdomain.com"
ssl_email: "admin@yourdomain.com"

# Test environment settings
test_domain: "test.yourdomain.com"
