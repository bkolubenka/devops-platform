- name: Setup server
  hosts: all
  become: true

  vars:
    docker_packages:
      - docker.io
      - docker-compose
      - certbot
      - python3-certbot-nginx

  tasks:
    - name: Install required packages
      apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory

    - name: Create SSL directory
      file:
        path: "{{ app_dir }}/ssl"
        state: directory

    - name: Copy project to server
      copy:
        src: ../../
        dest: "{{ app_dir }}"

    - name: Gather service facts
      service_facts:

    - name: Stop and disable system nginx when present
      service:
        name: nginx
        state: stopped
        enabled: false
      when: "'nginx.service' in ansible_facts.services"

    - name: Stop existing docker compose stack
      command: docker-compose -f {{ compose_file }} down --remove-orphans --volumes
      args:
        chdir: "{{ app_dir }}"
      failed_when: false

    - name: Stop all containers using port 80
      shell: docker ps -q --filter "publish=80" | xargs -r docker stop
      failed_when: false

    - name: Remove stopped containers
      command: docker container prune -f
      failed_when: false

    - name: Check whether nginx host port is already in use
      command: ss -ltnp sport = :{{ nginx_host_port }}
      register: port_80_check
      changed_when: false
      failed_when: false

    - name: Fail when nginx host port is occupied by another process
      fail:
        msg: "Port {{ nginx_host_port }} is already in use on the VM. Free it before deploy or change the nginx mapping. Details: {{ port_80_check.stdout | default('unknown process') }}"
      when: port_80_check.stdout is search(':' ~ nginx_host_port)

    - name: Require real production domain settings
      fail:
        msg: "Set domain_name and ssl_email to real production values before deploying prod."
      when: deploy_env == 'prod' and (domain_name == 'yourdomain.com' or ssl_email == 'admin@yourdomain.com')

    # SSL Certificate setup for production
    - name: Obtain SSL certificate (production only)
      command: certbot certonly --standalone --agree-tos --email {{ ssl_email }} -d {{ domain_name }}
      when: deploy_env == 'prod'

    - name: Copy SSL certificates to app directory
      copy:
        src: "/etc/letsencrypt/live/{{ domain_name }}/{{ item }}"
        dest: "{{ app_dir }}/ssl/{{ item }}"
        remote_src: yes
      with_items:
        - fullchain.pem
        - privkey.pem
      when: deploy_env == 'prod'

    - name: Run docker compose
      command: docker-compose -f {{ compose_file }} up -d --build
      args:
        chdir: "{{ app_dir }}"

    - name: Wait for nginx port
      wait_for:
        host: 127.0.0.1
        port: "{{ nginx_host_port }}"
        timeout: 60

    - name: Verify backend health endpoint via nginx
      uri:
        url: "{{ healthcheck_url }}"
        method: GET
        status_code: 200
      register: backend_health
      retries: 10
      delay: 3
      until: backend_health.json.status == "ok"

    - name: Setup SSL renewal cron job
      cron:
        name: "SSL certificate renewal"
        minute: "0"
        hour: "12"
        job: "certbot renew --quiet && docker-compose -f {{ app_dir }}/{{ compose_file }} restart nginx"
      when: deploy_env == 'prod'
