- name: Setup server
  hosts: all
  become: true

  vars:
    common_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    dev_packages:
      - git
    prod_packages:
      - certbot
      - python3-certbot-nginx
      - python3-certbot-dns-cloudflare

  tasks:
    - name: Validate deploy environment
      assert:
        that:
          - deploy_env in ['dev', 'prod']
        fail_msg: "Invalid deploy_env='{{ deploy_env }}'. Set DEPLOY_ENV to 'dev' or 'prod'."

    - name: Ensure APT keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install Docker APT signing key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Remove old Docker packages
      apt:
        name:
          - docker.io
          - docker-compose
          - docker-doc
          - podman-docker
        state: absent
        purge: yes

    - name: Install required packages
      apt:
        name: "{{ common_packages + (dev_packages if deploy_env == 'dev' else prod_packages) }}"
        state: present
        update_cache: yes

    - name: Ensure Docker is started
      service:
        name: docker
        state: started
        enabled: true

    - name: Wait for Docker socket
      wait_for:
        path: /var/run/docker.sock
        timeout: 30

    - name: Gather service facts
      service_facts:

    - name: Stop and disable system nginx when present
      service:
        name: nginx
        state: stopped
        enabled: false
      when: "'nginx.service' in ansible_facts.services"

    - name: Set default effective release metadata
      set_fact:
        effective_image_tag: "{{ image_tag }}"
        effective_app_version: "{{ app_version }}"
        effective_build_sha: "{{ build_sha }}"
        effective_build_date: "{{ build_date }}"
        effective_build_id: "{{ build_id }}"
        effective_container_registry: "{{ container_registry }}"

    - name: Ensure dev application directory exists
      file:
        path: "{{ app_base_dir }}"
        state: directory
      when: deploy_env == 'dev'

    - name: Ensure prod runtime directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ runtime_root }}"
        - "{{ runtime_release_dir }}"
        - "{{ runtime_root }}/ssl"
      when: deploy_env == 'prod'

    - name: Check for current release metadata
      stat:
        path: "{{ runtime_current_release_file }}"
      register: current_release_stat
      when: deploy_env == 'prod'

    - name: Check for previous release metadata
      stat:
        path: "{{ runtime_previous_release_file }}"
      register: previous_release_stat
      when: deploy_env == 'prod'

    - name: Read current release metadata
      slurp:
        path: "{{ runtime_current_release_file }}"
      register: current_release_raw
      when: deploy_env == 'prod' and current_release_stat.stat.exists

    - name: Parse previous release metadata for rollback
      shell: |
        set -a
        . "{{ runtime_previous_release_file }}"
        python3 - <<'PY'
        import json
        import os
        print(json.dumps({
            "IMAGE_TAG": os.environ.get("IMAGE_TAG"),
            "APP_VERSION": os.environ.get("APP_VERSION"),
            "BUILD_SHA": os.environ.get("BUILD_SHA"),
            "BUILD_DATE": os.environ.get("BUILD_DATE"),
            "BUILD_ID": os.environ.get("BUILD_ID"),
            "CONTAINER_REGISTRY": os.environ.get("CONTAINER_REGISTRY"),
        }))
        PY
      args:
        executable: /bin/bash
      register: previous_release_meta
      changed_when: false
      when: deploy_env == 'prod' and rollback_to_previous and previous_release_stat.stat.exists

    - name: Fail when rollback target is unavailable
      fail:
        msg: "Rollback requested, but {{ runtime_previous_release_file }} does not exist."
      when: deploy_env == 'prod' and rollback_to_previous and not previous_release_stat.stat.exists

    - name: Override effective metadata from previous release
      set_fact:
        effective_image_tag: "{{ (previous_release_meta.stdout | from_json).IMAGE_TAG }}"
        effective_app_version: "{{ (previous_release_meta.stdout | from_json).APP_VERSION }}"
        effective_build_sha: "{{ (previous_release_meta.stdout | from_json).BUILD_SHA }}"
        effective_build_date: "{{ (previous_release_meta.stdout | from_json).BUILD_DATE }}"
        effective_build_id: "{{ (previous_release_meta.stdout | from_json).BUILD_ID }}"
        effective_container_registry: "{{ (previous_release_meta.stdout | from_json).CONTAINER_REGISTRY }}"
      when: deploy_env == 'prod' and rollback_to_previous

    - name: Enforce immutable SHA-tagged production deploys
      fail:
        msg: "Production deploys must use the published 12-character SHA image tag, not '{{ effective_image_tag }}'."
      when:
        - deploy_env == 'prod'
        - effective_image_tag == 'main' or effective_image_tag is not match('^[0-9a-f]{12}$')

    - name: Require real production domain settings
      fail:
        msg: "Set domain_name and ssl_email to real production values before deploying prod."
      when: deploy_env == 'prod' and (domain_name == 'yourdomain.com' or ssl_email == 'admin@yourdomain.com')

    - name: Check for letsencrypt production certificate
      stat:
        path: "/etc/letsencrypt/live/{{ domain_name }}/fullchain.pem"
      register: prod_certificate_stat
      when: deploy_env == 'prod'

    - name: Check for runtime SSL certificate
      stat:
        path: "{{ runtime_root }}/ssl/fullchain.pem"
      register: runtime_certificate_stat
      when: deploy_env == 'prod'

    - name: Determine whether SSL certificate issuance is needed
      set_fact:
        ssl_needs_issue: "{{ not (prod_certificate_stat.stat.exists | default(false)) and not (runtime_certificate_stat.stat.exists | default(false)) }}"
      when: deploy_env == 'prod'

    - name: Check for existing production runtime compose file
      stat:
        path: "{{ runtime_root }}/docker-compose.prod.yaml"
      register: prod_runtime_compose_stat
      when: deploy_env == 'prod'

    - name: Validate dev repo_url is not a placeholder
      assert:
        that:
          - repo_url is not search('your/repo')
        fail_msg: "Invalid repo_url='{{ repo_url }}'. Use a real repository URL for dev deploys."
      when: deploy_env == 'dev'

    - name: Verify dev repository is reachable non-interactively
      command: git ls-remote "{{ repo_url }}" "{{ repo_version }}"
      register: dev_repo_probe
      changed_when: false
      environment:
        GIT_TERMINAL_PROMPT: "0"
      when: deploy_env == 'dev'

    - name: Fail fast when dev repository access is unavailable
      fail:
        msg: "Cannot access repo_url='{{ repo_url }}' with repo_version='{{ repo_version }}'. Check URL, repository visibility, and host credentials. Git output: {{ dev_repo_probe.stderr | default(dev_repo_probe.stdout) }}"
      when:
        - deploy_env == 'dev'
        - dev_repo_probe.rc != 0

    - name: Pull application source on server for dev
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_version }}"
        force: true
        update: true
      when: deploy_env == 'dev'

    # --- SSL certificate issuance (Cloudflare DNS-01 or standalone) ----------

    - name: Write Cloudflare DNS credentials file for certbot
      copy:
        dest: "{{ runtime_root }}/ssl/cf-credentials.ini"
        content: "dns_cloudflare_api_token = {{ cf_api_token }}\n"
        mode: "0600"
      when:
        - deploy_env == 'prod'
        - ssl_needs_issue | default(false) | bool
        - cf_api_token | length > 0

    - name: Obtain SSL certificate via Cloudflare DNS-01 challenge
      command: >-
        certbot certonly
        --dns-cloudflare
        --dns-cloudflare-credentials {{ runtime_root }}/ssl/cf-credentials.ini
        --dns-cloudflare-propagation-seconds 30
        --agree-tos --email {{ ssl_email }}
        -d {{ domain_name }} -d {{ domain_www }}
        --non-interactive
      register: certbot_dns_result
      when:
        - deploy_env == 'prod'
        - ssl_needs_issue | default(false) | bool
        - cf_api_token | length > 0

    - name: Remove Cloudflare credentials file after issuance
      file:
        path: "{{ runtime_root }}/ssl/cf-credentials.ini"
        state: absent
      when:
        - deploy_env == 'prod'
        - ssl_needs_issue | default(false) | bool
        - cf_api_token | length > 0

    - name: Stop containers on ports 80 and 443 before standalone certbot
      shell: |
        set -e
        ids=$(docker ps --filter "publish=80" --filter "publish=443" --format '{{ "{{" }}.ID{{ "}}" }}' | sort -u)
        if [ -n "$ids" ]; then
          docker stop $ids
        fi
        echo "$ids"
      args:
        executable: /bin/bash
      register: port_stop_for_certbot
      changed_when: "(port_stop_for_certbot.stdout | trim) != ''"
      when:
        - deploy_env == 'prod'
        - ssl_needs_issue | default(false) | bool
        - cf_api_token | length == 0

    - name: Obtain SSL certificate via standalone HTTP-01 challenge
      command: certbot certonly --standalone --agree-tos --email {{ ssl_email }} -d {{ domain_name }} --non-interactive
      register: certbot_standalone_result
      failed_when: false
      when:
        - deploy_env == 'prod'
        - ssl_needs_issue | default(false) | bool
        - cf_api_token | length == 0

    - name: Read letsencrypt log tail after certbot failure
      command: tail -80 /var/log/letsencrypt/letsencrypt.log
      register: le_log_tail
      changed_when: false
      when:
        - deploy_env == 'prod'
        - certbot_standalone_result is defined
        - certbot_standalone_result.rc | default(0) != 0

    - name: Fail with detailed certbot diagnostics
      fail:
        msg: >-
          Certbot standalone challenge failed.
          If Cloudflare proxy is active (orange cloud), standalone HTTP-01
          cannot work. Set the CF_API_TOKEN secret to use DNS-01 instead,
          or temporarily disable Cloudflare proxy (grey cloud) during deploy.
          Certbot stderr: {{ certbot_standalone_result.stderr | default('unavailable') }}
          Log tail: {{ le_log_tail.stdout | default('unavailable') }}
      when:
        - deploy_env == 'prod'
        - certbot_standalone_result is defined
        - certbot_standalone_result.rc | default(0) != 0

    - name: Copy SSL certificates from letsencrypt into runtime directory
      copy:
        src: "/etc/letsencrypt/live/{{ domain_name }}/{{ item }}"
        dest: "{{ runtime_root }}/ssl/{{ item }}"
        remote_src: yes
        mode: "0600"
      loop:
        - fullchain.pem
        - privkey.pem
      when:
        - deploy_env == 'prod'
        - ssl_needs_issue | default(false) | bool

    - name: Render prod runtime compose file
      template:
        src: docker-compose.prod.yaml.j2
        dest: "{{ runtime_root }}/docker-compose.prod.yaml"
        mode: "0644"
      when: deploy_env == 'prod'

    - name: Render prod nginx config
      template:
        src: prod.conf.j2
        dest: "{{ runtime_root }}/prod.conf"
        mode: "0644"
      when: deploy_env == 'prod'

    - name: Render prod runtime env file
      template:
        src: prod.env.j2
        dest: "{{ runtime_env_file }}"
        mode: "0600"
      when: deploy_env == 'prod'

    - name: Run dev docker compose build and deploy
      command: docker compose --env-file .env.dev -f {{ compose_file }} up -d --build
      args:
        chdir: "{{ app_dir }}"
      environment:
        GHCR_OWNER: "{{ ghcr_owner }}"
        IMAGE_TAG: "{{ effective_image_tag }}"
        APP_VERSION: "{{ effective_app_version }}"
        BUILD_SHA: "{{ effective_build_sha }}"
        BUILD_DATE: "{{ effective_build_date }}"
        BUILD_ID: "{{ effective_build_id }}"
        CONTAINER_REGISTRY: "{{ effective_container_registry }}"
      when: deploy_env == 'dev'

    - name: Restart dev nginx to refresh upstream targets
      command: docker compose --env-file .env.dev -f {{ compose_file }} restart nginx
      args:
        chdir: "{{ app_dir }}"
      when: deploy_env == 'dev'

    - name: Verify production image tags exist in GHCR
      shell: docker manifest inspect ghcr.io/{{ ghcr_owner }}/devops-platform-{{ item }}:{{ effective_image_tag }} >/dev/null
      args:
        executable: /bin/bash
      register: ghcr_image_manifest_checks
      changed_when: false
      failed_when: false
      loop:
        - backend
        - frontend
        - monitor-worker
      when: deploy_env == 'prod'

    - name: Fail when production image tag is not published to GHCR
      fail:
        msg: "Missing GHCR image tag '{{ effective_image_tag }}' for: {{ ghcr_image_manifest_checks.results | selectattr('rc', 'ne', 0) | map(attribute='item') | join(', ') }}. Publish images from main and use the published sha_short tag."
      when:
        - deploy_env == 'prod'
        - (ghcr_image_manifest_checks.results | selectattr('rc', 'ne', 0) | list | length) > 0

    - name: Pull production images
      command: docker compose -f docker-compose.prod.yaml pull
      args:
        chdir: "{{ runtime_root }}"
      when: deploy_env == 'prod'

    - name: Start only the production database
      command: docker compose -f docker-compose.prod.yaml up -d db
      args:
        chdir: "{{ runtime_root }}"
      when: deploy_env == 'prod'

    - name: Wait for production database container health
      shell: docker inspect --format='{{ "{{" }} .State.Health.Status {{ "}}" }}' devops_db_prod
      register: prod_db_health
      retries: 20
      delay: 3
      changed_when: false
      until: prod_db_health.stdout == "healthy"
      when: deploy_env == 'prod'

    - name: Run one-shot production database migration
      shell: docker compose -f docker-compose.prod.yaml run --rm backend alembic -c backend/alembic.ini upgrade head
      args:
        chdir: "{{ runtime_root }}"
      when: deploy_env == 'prod'

    - name: Stop containers publishing 80 or 443 before starting production stack
      shell: |
        set -e
        ids=$(docker ps --filter "publish=80" --filter "publish=443" --format '{{ "{{" }}.ID{{ "}}" }}' | sort -u)
        if [ -n "$ids" ]; then
          docker stop $ids
        fi
        echo "$ids"
      args:
        executable: /bin/bash
      register: port_listener_stop_before_prod
      changed_when: "(port_listener_stop_before_prod.stdout | trim) != ''"
      when: deploy_env == 'prod'

    - name: Start production stack
      command: docker compose -f docker-compose.prod.yaml up -d
      args:
        chdir: "{{ runtime_root }}"
      when: deploy_env == 'prod'

    - name: Wait for nginx port
      wait_for:
        host: 127.0.0.1
        port: "{{ nginx_host_port }}"
        timeout: 90

    - name: Verify backend health endpoint via nginx
      uri:
        url: "{{ healthcheck_url }}"
        method: GET
        status_code: 200
      register: backend_health
      retries: 15
      delay: 4
      until: backend_health.json.status == "ok"

    - name: Update previous release metadata after successful deploy
      copy:
        content: "{{ current_release_raw.content | b64decode }}"
        dest: "{{ runtime_previous_release_file }}"
        mode: "0600"
      when: deploy_env == 'prod' and current_release_stat.stat.exists

    - name: Record current release metadata
      template:
        src: release.env.j2
        dest: "{{ runtime_current_release_file }}"
        mode: "0600"
      when: deploy_env == 'prod'

    - name: Setup SSL renewal cron job
      cron:
        name: "SSL certificate renewal"
        minute: "0"
        hour: "12"
        job: "certbot renew --quiet --deploy-hook 'cp /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem {{ runtime_root }}/ssl/fullchain.pem; cp /etc/letsencrypt/live/{{ domain_name }}/privkey.pem {{ runtime_root }}/ssl/privkey.pem; chmod 600 {{ runtime_root }}/ssl/*.pem; docker compose -f {{ runtime_root }}/docker-compose.prod.yaml restart nginx'"
      when: deploy_env == 'prod'
