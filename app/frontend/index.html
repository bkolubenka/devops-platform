<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps Platform</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5efe4;
        --surface: #fffaf2;
        --ink: #1f2937;
        --muted: #5b6472;
        --accent: #c75b12;
        --accent-soft: #ffd9bf;
        --line: rgba(31, 41, 55, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(199, 91, 18, 0.16), transparent 30%),
          linear-gradient(135deg, var(--bg), #f0f6ff 55%, #fff4ea);
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 48px auto;
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 250, 242, 0.88);
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 60px rgba(31, 41, 55, 0.08);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.9rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 6vw, 5rem);
        line-height: 0.95;
      }

      p {
        color: var(--muted);
        font-size: 1.1rem;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        gap: 16px;
        margin-top: 28px;
      }

      @media (min-width: 720px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      .card {
        padding: 18px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: white;
      }

      .label {
        margin: 0 0 6px;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .value {
        margin: 0;
        font-size: 1.15rem;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 18px;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--ink);
        font-weight: 700;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
      }

      code {
        font-family: "Courier New", monospace;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">DevOps Full Cycle Project</p>
      <h1>Frontend routed through Nginx.</h1>
      <p>
        This page is served by the frontend container. API requests are routed through
        <code>/api</code> to the FastAPI backend.
      </p>

      <div class="status">
        <span class="dot"></span>
        <span id="health-status">Checking backend health...</span>
      </div>

      <section class="grid">
        <article class="card">
          <p class="label">Frontend</p>
          <p class="value">Nginx static container</p>
        </article>
        <article class="card">
          <p class="label">Backend</p>
          <p class="value">FastAPI behind reverse proxy</p>
        </article>
        <article class="card">
          <p class="label">API endpoint</p>
          <p class="value"><code>/api/health</code></p>
        </article>
      </section>
    </main>

    <script>
      async function loadHealth() {
        const target = document.getElementById("health-status");

        try {
          const response = await fetch("/api/health");
          const data = await response.json();
          target.textContent = "Backend health: " + data.status;
        } catch (error) {
          target.textContent = "Backend health check failed";
        }
      }

      loadHealth();
    </script>
  </body>
</html>
