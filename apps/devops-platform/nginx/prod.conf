# REFERENCE ONLY — This file is NOT used in production.
# Production Nginx runs on the host and uses the Ansible template at:
#   infra/ansible/templates/prod.conf.j2
# rendered to /etc/nginx/conf.d/kydyrov.dev.conf
#
# This file is kept as a local reference for the prod Nginx config shape.
# For actual changes, edit infra/ansible/templates/prod.conf.j2 instead.

upstream app_backend {
    server 127.0.0.1:8000;
}

upstream app_frontend {
    server 127.0.0.1:8080;
}

upstream app_grafana {
    server 127.0.0.1:3000;
}

upstream app_prometheus {
    server 127.0.0.1:9090;
}

server {
    listen 80;
    server_name kydyrov.dev www.kydyrov.dev local.kydyrov.dev;
    server_tokens off;

    location = /health {
        proxy_pass http://app_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 301 https://kydyrov.dev$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.kydyrov.dev;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/kydyrov.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kydyrov.dev/privkey.pem;
    include snippets/ssl-params.conf;

    return 301 https://kydyrov.dev$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kydyrov.dev local.kydyrov.dev;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/kydyrov.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kydyrov.dev/privkey.pem;
    include snippets/ssl-params.conf;

    location /api/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://app_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
        proxy_pass http://app_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /prometheus/ {
        proxy_pass http://app_prometheus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://app_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}
